name: playz_user
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.8
  google_place: ^0.4.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  motion_tab_bar: ^2.0.4
  smooth_page_indicator: ^1.2.1
  translator: ^0.1.7
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  vector_math: ^2.1.4
  syncfusion_flutter_charts: ^31.1.19
  provider: ^6.1.5+1
  stylish_bottom_bar: ^1.1.1
  pie_chart: ^5.4.0
  image_picker: ^1.2.0
  intl: ^0.20.2
