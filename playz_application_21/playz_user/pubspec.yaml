  firebase_auth: ^5.7.0
  razorpay_flutter: ^1.4.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.2
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  model_viewer_plus: ^1.9.3
  

